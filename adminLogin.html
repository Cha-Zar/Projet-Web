<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mondélys – Connexion Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Lora:ital,wght@0,400;0,500;1,400&family=Raleway:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="styleAdmin.css"/>
  <style>
    html, body { width: 100%; height: 100%; }
    body.admin-login-page { display:block !important; min-height:100vh; overflow:auto; background-image: url('https://images.unsplash.com/photo-1414235077428-338989a2e8c0?w=1600&q=90'); background-size: cover; background-position: center; background-attachment: fixed; position: relative; }
    body.admin-login-page::before { content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(135deg, rgba(0,0,0,0.7), rgba(0,0,0,0.5)); z-index: 0; }
    .admin-login-wrap { width:100vw; min-height: 100vh; display:flex; align-items:center; justify-content:center; padding:1rem; position: relative; z-index: 1; }
    .admin-login-card { background: rgba(255,255,255,0.95); backdrop-filter: blur(2px); width:min(460px,100%); padding:2rem; border:1px solid var(--sand2); border-radius: 16px; box-shadow: 0 20px 40px rgba(0,0,0,0.3); }
    .admin-login-brand { display:flex; align-items:center; gap:.75rem; margin-bottom:1.5rem; }
    .admin-login-brand .logo-emblem { font-size:1.4rem; color:var(--terracotta); }
    .admin-login-card h1 { margin:0; font-family:var(--ff-display); font-size:1.4rem; color:var(--night); }
    .admin-login-sub { margin:.25rem 0 1.5rem; color:var(--text-light); font-size:.9rem; }
    .admin-login-form { display:flex; flex-direction:column; gap:1rem; }
    .admin-login-form label { font-size:.76rem; letter-spacing:1px; text-transform:uppercase; color:var(--text-light); }
    .admin-login-form input { border:1px solid var(--sand2); padding:.75rem .8rem; width:100%; border-radius: 8px; }
    .admin-login-form button { width:100%; padding: 10px; background: #1f1f1f; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
    .admin-login-form button:hover { background: #333; }
    .admin-login-error { min-height:1rem; color:#b91c1c; font-size:.83rem; margin-top: 5px; }
  </style>
</head>
<body class="admin-login-page">
  <div class="admin-login-wrap">
    <div class="admin-login-card">
      <div class="admin-login-brand">
        <span class="logo-emblem">☽</span>
        <div>
          <h1>Mondélys Admin</h1>
          <div class="admin-login-sub">Connexion sécurisée</div>
        </div>
      </div>

      <form id="adminLoginForm" class="admin-login-form">
        <div>
          <label for="adminEmail">Email</label>
          <input id="adminEmail" type="email" placeholder="admin@mondelys.tn" required />
        </div>
        <div>
          <label for="adminPassword">Mot de passe</label>
          <input id="adminPassword" type="password" placeholder="********" required />
        </div>
        <div class="admin-login-error" id="adminLoginError"></div>
        <button class="btn-sm" type="submit">Se connecter</button>
      </form>
    </div>
  </div>
  <script src="adminLogin.js"></script>
</body>
</html>
